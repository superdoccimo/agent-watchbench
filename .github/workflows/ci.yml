name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  fixture-gate:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile prototype
        run: python -m py_compile agent_watchbench.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Verify synthetic fixture report
        run: |
          python agent_watchbench.py scan \
            --root examples/fixture-root \
            --day 2099-01-02 \
            --output /tmp/agent-watchbench-fixture-report.md
          diff -u examples/fixture-report.md /tmp/agent-watchbench-fixture-report.md

      - name: Verify synthetic secret-scan fixture report
        run: |
          python agent_watchbench.py secret-scan \
            --root examples/secret-scan-root \
            --output /tmp/agent-watchbench-secret-scan-report.md
          diff -u examples/secret-scan-report.md /tmp/agent-watchbench-secret-scan-report.md

      - name: Verify fixture audit report
        run: |
          python agent_watchbench.py fixture-audit \
            --root . \
            --output /tmp/agent-watchbench-fixture-audit-report.md
          diff -u examples/fixture-audit-report.md /tmp/agent-watchbench-fixture-audit-report.md

      - name: Verify private PR packet audit report
        run: |
          python agent_watchbench.py pr-packet-audit \
            --root . \
            --fail-on-missing \
            --output /tmp/agent-watchbench-private-pr-packet-audit-report.md
          diff -u examples/private-pr-packet-audit-report.md /tmp/agent-watchbench-private-pr-packet-audit-report.md

      - name: Verify release index audit report
        run: |
          python agent_watchbench.py release-index-audit \
            --root . \
            --fail-on-missing \
            --output /tmp/agent-watchbench-release-index-audit-report.md
          diff -u examples/release-index-audit-report.md /tmp/agent-watchbench-release-index-audit-report.md

      - name: Verify release sync audit report
        run: |
          python agent_watchbench.py release-sync-audit \
            --root . \
            --candidate 9cf57ed974903fbe210f392f73c6b6f1ac7f7895 \
            --fail-on-stale \
            --output /tmp/agent-watchbench-release-sync-audit-report.md
          diff -u examples/release-sync-audit-report.md /tmp/agent-watchbench-release-sync-audit-report.md
