name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  fixture-gate:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile prototype
        run: python -m py_compile agent_watchbench.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Verify synthetic fixture report
        run: |
          python agent_watchbench.py scan \
            --root examples/fixture-root \
            --day 2099-01-02 \
            --output /tmp/agent-watchbench-fixture-report.md
          diff -u examples/fixture-report.md /tmp/agent-watchbench-fixture-report.md
